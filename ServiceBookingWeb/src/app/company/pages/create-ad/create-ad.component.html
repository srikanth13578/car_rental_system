<div style="background-color: #f8f8f8;">
  <div class="parent">
    <div class="child">

      <div nz-row class="imgdiv">
        <h2 style="margin-left: 230px;">Create Ad</h2>
      </div>

      <form nz-form [formGroup]="validateForm" (ngSubmit)="postAd()">
        <div nz-row>
          <div nz-col [nzMd]="24" [nzSm]="24" [nzXs]="24">

            <div class="profile-badge">
              <label for="upload_profile_image" class="upload-label" *ngIf="selectedFile">
                <img class="profile" [src]="imagePreview" alt="profile" />
              </label>
              <input
                type="file"
                nz-button
                nzType="primary"
                accept="image/png,image/gif,image/jpeg"
                (change)="onFileSelected($event)"
              />
            </div>

            <div nz-col nzSpan="24" style="margin-top: 20px;">
              <nz-form-item>
                <nz-form-control nzHasFeedback [nzXs]="24" nzErrorTip="This Input Is Required!">
                  <input
                    nz-input
                    placeholder="Service Name"
                    formControlName="serviceName"
                  />
                </nz-form-control>
              </nz-form-item>
            </div>

            <div nz-col nzSpan="24">
              <nz-form-item>
                <nz-form-control nzHasFeedback [nzXs]="24" nzErrorTip="This Input Is Required!">
                  <input
                    nz-input
                    placeholder="Price"
                    type="number"
                    formControlName="price"
                  />
                </nz-form-control>
              </nz-form-item>
            </div>

            <div nz-col nzSpan="24">
              <nz-form-item>
                <nz-form-control nzHasFeedback [nzXs]="24" nzErrorTip="This Input Is Required!">
                  <textarea
                    rows="1"
                    nz-input
                    placeholder="Description"
                    formControlName="description"
                  ></textarea>
                </nz-form-control>
              </nz-form-item>
            </div>

            <div nz-col nzSpan="24" style="margin-top: 20px;">
              <button
                nz-button
                class="login-form-button login-form-margin"
                [nzType]="'primary'"
                [disabled]="!validateForm.valid || !selectedFile"
              >
                Add
              </button>
            </div>

          </div>
        </div>
      </form>

    </div>
  </div>
</div>
